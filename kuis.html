    <style>
        :root {
            --bg-main: #f8fafc; --bg-card: #ffffff; --card-border: #e2e8f0;
            --text-main: #0f172a; --text-muted: #64748b;
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7);
            --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --correct: #10b981; --wrong: #ef4444; --tkp-color: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }

        .aurora { position: fixed; width: 40vw; height: 40vw; border-radius: 50%; background: var(--primary-gradient); filter: blur(150px); opacity: 0.15; z-index: -1; pointer-events: none; }
        .orb-1 { top: -10%; left: -10%; } .orb-2 { bottom: -10%; right: -10%; }

        .header { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); padding: 15px 25px; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: var(--shadow-soft); }
        .logo { font-size: 18px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .score-badge { font-weight: 700; color: #475569; background: #e2e8f0; padding: 5px 15px; border-radius: 12px; font-size: 14px;}

        .app-container { width: 100%; max-width: 800px; background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 24px; padding: 30px; box-shadow: var(--shadow-soft); position: relative; }
        
        #loadingArea { text-align: center; padding: 50px 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #a855f7; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #quizArea { display: none; }
        .progress-container { width: 100%; background: #e2e8f0; height: 8px; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary-gradient); width: 0%; transition: width 0.3s; }
        
        .question-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .category-badge { background: rgba(99, 102, 241, 0.1); color: #4f46e5; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        .timer { font-size: 18px; font-weight: 800; color: var(--wrong); display: flex; align-items: center; gap: 5px;}

        .question-text { font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: var(--text-main); }
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { width: 100%; text-align: left; background: var(--bg-main); border: 1px solid var(--card-border); padding: 15px 20px; border-radius: 16px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; color: var(--text-main); display: flex; align-items: center; gap: 15px; }
        .option-btn:hover { border-color: #a855f7; background: rgba(168, 85, 247, 0.05); }
        .option-btn:disabled { cursor: not-allowed; }
        .opt-label { font-weight: 700; background: #e2e8f0; padding: 5px 10px; border-radius: 8px; font-size: 14px; min-width: 32px; text-align: center; }
        
        /* PEWARNAAN JAWABAN FIX */
        .option-btn.correct { background: rgba(16, 185, 129, 0.1); border-color: var(--correct); }
        .option-btn.correct .opt-label { background: var(--correct); color: white; }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.1); border-color: var(--wrong); }
        .option-btn.wrong .opt-label { background: var(--wrong); color: white; }
        .option-btn.tkp-selected { background: rgba(245, 158, 11, 0.1); border-color: var(--tkp-color); }
        .option-btn.tkp-selected .opt-label { background: var(--tkp-color); color: white; }

        #explanationBox { display: none; margin-top: 25px; padding: 20px; background: #f1f5f9; border-left: 4px solid #a855f7; border-radius: 12px; font-size: 14px; color: var(--text-muted); }
        #explanationBox h4 { color: var(--text-main); margin-bottom: 8px; }

        .btn-next { margin-top: 20px; width: 100%; background: var(--primary-gradient); color: white; border: none; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: none; transition: 0.3s; }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4); }

        #resultArea { display: none; text-align: center; padding: 20px 0; }
        .final-score { font-size: 60px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; }
        .result-desc { color: var(--text-muted); margin-bottom: 30px; }
        .btn-home { text-decoration: none; display: inline-block; background: #e2e8f0; color: #0f172a; padding: 12px 25px; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-home:hover { background: #cbd5e1; }

        @media (max-width: 600px) { .app-container { padding: 20px; } .question-text { font-size: 16px; } .option-btn { padding: 12px 15px; font-size: 14px; } }
    </style>

<body>

    <div class="aurora orb-1"></div>
    <div class="aurora orb-2"></div>

    <div class="header">
        <a href="index.html" class="logo"><i class="fa-solid fa-graduation-cap"></i> MiVida</a>
        <div class="score-badge">Skor: <span id="scoreDisplay">0</span></div>
    </div>

    <div class="app-container">
        
        <div id="loadingArea">
            <div class="loader"></div>
            <h3 style="color: var(--text-main);">Menyiapkan Server CAT...</h3>
            <p style="color: var(--text-muted); font-size: 14px;" id="loadingDesc">Menarik soal dari Database</p>
        </div>

        <div id="quizArea">
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="question-meta"><span class="category-badge" id="qCategory">TIU</span><div class="timer"><i class="fa-regular fa-clock"></i> <span id="timeText">10</span>s</div></div>
            <div class="question-text" id="qText">Memuat soal...</div>
            <div class="options-container" id="optionsBox"></div>

            <div id="explanationBox">
                <h4><i class="fa-solid fa-lightbulb" style="color: #f59e0b;"></i> Pembahasan</h4>
                <div id="expText"></div>
            </div>
            <button class="btn-next" id="btnNext" onclick="nextQuestion()">Soal Selanjutnya <i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <div id="resultArea">
            <h2>Simulasi Selesai!</h2>
            <p class="result-desc">Berikut adalah total skor akhir pencapaian Anda.</p>
            <div class="final-score" id="finalScore">0</div>
            <a href="index.html" class="btn-home"><i class="fa-solid fa-home"></i> Kembali ke Beranda</a>
        </div>

    </div>

    <script>
        // ROUTING DATABASE CERDAS (Mampu mengubah URL /pubhtml menjadi CSV Murni secara otomatis)
        const urlParams = new URLSearchParams(window.location.search);
        const activeModule = urlParams.get('module');
        let rawURL = "";

        if (activeModule === "bumn1") {
            document.getElementById('loadingDesc').innerText = "Memuat Database BUMN Chapter 1...";
            rawURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTT7q1J0uPg7HDQ48JydQFZmZj5hro3QFjAq_4eGNKeNvcSs49M1kAU6kt93Jpe8haqeuvAPeC3THB/pubhtml?gid=1111447607&single=true";
        } else if (activeModule === "cpns3") {
            document.getElementById('loadingDesc').innerText = "Memuat Database CPNS Chapter 3...";
            rawURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTT7q1J0uPg7HDQ48JydQFZmZj5hro3QFjAq_4eGNKeNvcSs49M1kAU6kt93Jpe8haqeuvAPeC3THB/pubhtml?gid=2124912226&single=true"; 
        } else {
            (activeModule === "cpns2") {
            document.getElementById('loadingDesc').innerText = "Memuat Database CPNS Chapter 2...";
            rawURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTT7q1J0uPg7HDQ48JydQFZmZj5hro3QFjAq_4eGNKeNvcSs49M1kAU6kt93Jpe8haqeuvAPeC3THB/pubhtml?gid=177118517&single=true"; 
        } else {
            document.getElementById('loadingDesc').innerText = "Memuat Database CPNS Chapter 1...";
            rawURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTT7q1J0uPg7HDQ48JydQFZmZj5hro3QFjAq_4eGNKeNvcSs49M1kAU6kt93Jpe8haqeuvAPeC3THB/pubhtml?gid=1999742481&single=true";
        }
        
        // KONVERTER AJAIB: Apapun URL dari Anda, mesin akan memaksanya menjadi format CSV agar tidak error
        let sheetURL = rawURL.replace("/pubhtml", "/pub").replace("?gid=", "?output=csv&gid=");
        if(!sheetURL.includes("output=csv")) sheetURL += "&output=csv";

        let database = [];
        let currentIndex = 0;
        let score = 0;
        let timeLeft = 10;
        let timerInterval;
        let isAnswered = false;
        const labels = ['A', 'B', 'C', 'D', 'E'];

        // FUNGSI PARSER ANTI-ERROR (Membaca spasi, kapital, atau underscore dengan cerdas)
        function getColValue(row, possibleNames) {
            let normalizedRow = {};
            for (let key in row) {
                let cleanKey = key.toUpperCase().replace(/[^A-Z0-9]/g, ''); 
                normalizedRow[cleanKey] = row[key];
            }
            for (let name of possibleNames) {
                let cleanName = name.toUpperCase().replace(/[^A-Z0-9]/g, '');
                if (normalizedRow[cleanName] !== undefined && normalizedRow[cleanName] !== null) {
                    return normalizedRow[cleanName];
                }
            }
            return "";
        }

        window.onload = function() {
            Papa.parse(sheetURL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // Cek jika error pembacaan data HTML nyasar
                    if (!results.data || results.data.length === 0 || !results.data[0].hasOwnProperty(Object.keys(results.data[0])[0])) {
                        document.getElementById('loadingArea').innerHTML = "<h3 style='color:red;'>Gagal mengurai CSV. Harap pastikan format publikasi Google Sheets benar.</h3>";
                        return;
                    }

                    database = results.data.filter(row => getColValue(row, ['Soal', 'Pertanyaan']).trim() !== "").map(row => {
                        
                        // Ekstraksi Huruf Kunci Jawaban dengan Sangat Aman
                        let rawKey = getColValue(row, ['Kunci', 'KunciJawaban', 'Jawaban']).toString().trim().toUpperCase();
                        let keyIndex = -1;
                        let match = rawKey.match(/^([A-E])/); 
                        if (match) {
                            keyIndex = labels.indexOf(match[1]);
                        } else {
                            let fallbackMatch = rawKey.match(/\b([A-E])\b/);
                            if (fallbackMatch) keyIndex = labels.indexOf(fallbackMatch[1]);
                        }
                        if (keyIndex === -1) keyIndex = 0; 

                        return {
                            category: getColValue(row, ['Kategori', 'Jenis', 'Materi']) || "Soal",
                            question: getColValue(row, ['Soal', 'Pertanyaan']),
                            options: [
                                getColValue(row, ['OpsiA', 'A', 'PilihanA']),
                                getColValue(row, ['OpsiB', 'B', 'PilihanB']),
                                getColValue(row, ['OpsiC', 'C', 'PilihanC']),
                                getColValue(row, ['OpsiD', 'D', 'PilihanD']),
                                getColValue(row, ['OpsiE', 'E', 'PilihanE'])
                            ],
                            correctIndex: keyIndex, 
                            explanation: getColValue(row, ['Pembahasan', 'Penjelasan']),
                            breakdowns: [
                                getColValue(row, ['AnalisisA', 'PembahasanA', 'SkorA']),
                                getColValue(row, ['AnalisisB', 'PembahasanB', 'SkorB']),
                                getColValue(row, ['AnalisisC', 'PembahasanC', 'SkorC']),
                                getColValue(row, ['AnalisisD', 'PembahasanD', 'SkorD']),
                                getColValue(row, ['AnalisisE', 'PembahasanE', 'SkorE'])
                            ]
                        };
                    });

                    if(database.length > 0) { startQuiz(); } 
                    else { document.getElementById('loadingArea').innerHTML = "<h3 style='color:red;'>Koneksi Database Kosong.</h3>"; }
                },
                error: function() { document.getElementById('loadingArea').innerHTML = "<h3 style='color:red;'>Koneksi internet bermasalah.</h3>"; }
            });
        };

        function startQuiz() {
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            clearInterval(timerInterval);
            timeLeft = 10;
            document.getElementById('timeText').innerText = timeLeft;
            
            let q = database[currentIndex];
            document.getElementById('progressBar').style.width = ((currentIndex) / database.length) * 100 + '%';
            document.getElementById('qCategory').innerText = q.category + ` (${currentIndex + 1}/${database.length})`;
            document.getElementById('qText').innerText = q.question;
            
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('explanationBox').style.display = 'none';

            let optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                if (opt && opt.trim() !== "") {
                    let btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.dataset.id = index;
                    btn.innerHTML = `<span class="opt-label">${labels[index]}</span> <span>${opt}</span>`;
                    btn.onclick = () => selectAnswer(index);
                    optionsBox.appendChild(btn);
                }
            });

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timeText').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerInterval); if (!isAnswered) selectAnswer(-1); }
            }, 1000);
        }

        function selectAnswer(selectedIndex) {
            if (isAnswered) return;
            isAnswered = true;
            clearInterval(timerInterval);

            let q = database[currentIndex];
            let buttons = document.querySelectorAll('.option-btn');
            
            let isScored1to5 = q.category.toUpperCase().includes("TKP") || q.category.toUpperCase().includes("AKHLAK");
            
            let selectedBtn = Array.from(buttons).find(b => parseInt(b.dataset.id) === selectedIndex);
            let correctBtn = Array.from(buttons).find(b => parseInt(b.dataset.id) === q.correctIndex);
            let pointsEarned = 0;

            buttons.forEach(btn => btn.disabled = true);

            if (isScored1to5) {
                if (selectedBtn) {
                    let analysisText = q.breakdowns[selectedIndex] || "";
                    let match = analysisText.match(/Skor\s*(\d)/i);
                    pointsEarned = match ? parseInt(match[1]) : (selectedIndex === q.correctIndex ? 5 : 1);
                    
                    if (pointsEarned === 5) {
                        selectedBtn.classList.add('correct'); 
                    } else {
                        selectedBtn.classList.add('tkp-selected');
                        if (correctBtn) correctBtn.classList.add('correct'); 
                    }
                } else {
                    if (correctBtn) correctBtn.classList.add('correct');
                }
            } else {
                if (selectedIndex === q.correctIndex) {
                    pointsEarned = 5;
                    if (selectedBtn) selectedBtn.classList.add('correct');
                } else {
                    pointsEarned = 0;
                    if (selectedBtn) selectedBtn.classList.add('wrong');
                    if (correctBtn) correctBtn.classList.add('correct');
                }
            }

            score += pointsEarned;
            document.getElementById('scoreDisplay').innerText = score;

            let expBox = document.getElementById('explanationBox');
            let htmlExp = `<strong>Kunci Utama: ${labels[q.correctIndex]}</strong><br>${q.explanation}<br><br>`;
            
            if (selectedIndex !== -1 && q.breakdowns[selectedIndex]) {
                htmlExp += `<em>Analisis Pilihan Anda:</em><br>${q.breakdowns[selectedIndex]}`;
            } else if (selectedIndex === -1) {
                htmlExp += `<em style="color:red;">Waktu Habis! Anda tidak mendapatkan poin.</em>`;
            }

            document.getElementById('expText').innerHTML = htmlExp;
            expBox.style.display = 'block';

            let btnNext = document.getElementById('btnNext');
            btnNext.innerHTML = (currentIndex === database.length - 1) ? 'Selesaikan Ujian <i class="fa-solid fa-flag-checkered"></i>' : 'Soal Selanjutnya <i class="fa-solid fa-arrow-right"></i>';
            btnNext.style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < database.length) { loadQuestion(); } else { showResult(); }
        }

        function showResult() {
            document.getElementById('quizArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
        }
    </script>
</body>
</html>
