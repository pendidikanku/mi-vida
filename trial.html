<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAL - Simulasi CPNS 10 Detik</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="soal-database.js"></script>

    <style>
        :root { --bg-dark: #05070f; --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff;}
        body { background: var(--bg-dark); display: flex; justify-content: center; padding: 20px; min-height: 100vh; overflow-x: hidden;}
        
        .app-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-home { background: rgba(255,255,255,0.1); text-decoration: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 14px;}
        .timer-badge { font-size: 16px; font-weight: 800; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 10px; }
        .timer-badge.danger { background: rgba(239, 68, 68, 0.2); color: #fca5a5; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .flashcard-wrapper { flex-grow: 1; perspective: 1000px; position: relative; min-height: 450px;}
        .card { width: 100%; height: 100%; position: absolute; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .card-back { transform: rotateY(180deg); background: rgba(15,23,42,0.95); }
        
        .q-category { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; align-self: flex-start; margin-bottom: 20px; color: #d8b4fe;}
        .q-text { font-size: 22px; font-weight: 800; margin-bottom: 25px; text-align: center; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn-opt { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s; display: flex; gap: 15px; align-items: center;}
        .btn-opt:hover { background: rgba(255,255,255,0.15); border-color: #a855f7; }
        .opt-letter { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 8px; font-weight: bold; color: #a855f7;}

        .res-badge { padding: 10px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 18px;}
        .exp-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .breakdown-item { display: flex; gap: 10px; margin-top: 10px; font-size: 13px; color: #cbd5e1; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;}
        
        .bottom-controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; background: var(--primary-gradient); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none;}
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168,85,247,0.4); }

        /* Pop Up Berhenti Trial */
        .trial-end { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px 20px; height: 100%;}
        .trial-end.active { display: flex; }
        .trial-end i { font-size: 50px; color: #10b981; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="top-bar" id="topBar">
            <a href="index.html" class="btn-home"><i class="fa-solid fa-arrow-left"></i> Home</a>
            <div style="font-size: 14px; font-weight: bold;">Soal <span id="qCounter">1/10</span></div>
            <div class="timer-badge" id="timerBadge">10s</div>
        </div>

        <div class="flashcard-wrapper" id="quizArea">
            <div class="card" id="flashcard">
                
                <div class="card-face">
                    <div class="q-category" id="qCategory">Memuat...</div>
                    <div class="q-text" id="qText">Menghubungkan ke Database...</div>
                    <div class="options" id="optContainer"></div>
                </div>

                <div class="card-face card-back">
                    <div class="res-badge" id="resBadge">Hasil</div>
                    <div class="exp-box">
                        <div style="color: #a855f7; font-weight: bold; margin-bottom: 10px; font-size: 16px;">Kunci: <span id="ansText"></span></div>
                        <div id="expText" style="margin-bottom: 15px;"></div>
                        <div style="font-weight: bold; color: #fff; margin-bottom: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">Analisis Opsi:</div>
                        <div id="breakdownGrid"></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="trial-end" id="trialEnd">
            <i class="fa-solid fa-unlock-keyhole"></i>
            <h2 style="margin-bottom: 15px;">Batas Trial Selesai!</h2>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 30px;">
                Adrenalin Anda sudah terpacu? Ini baru 10 soal awal! Buka kunci sisa 90 soal lainnya dengan analisis yang jauh lebih mendalam.
            </p>
            <a href="https://link-terabox-anda.com/tiu-chapter-1" class="btn-action" style="width: 100%; margin-bottom: 10px;">
                <i class="fa-solid fa-cloud-arrow-down"></i> Download Full Version di TeraBox
            </a>
            <a href="index.html" style="color: #a855f7; font-size: 13px; text-decoration: none; font-weight: bold;">Kembali ke Beranda</a>
        </div>

        <div class="bottom-controls" id="controls" style="display: none;">
            <button class="btn-action" onclick="nextQuestion()">Lanjut Soal Berikutnya <i class="fa-solid fa-arrow-right"></i></button>
        </div>

    </div>

    <script>
        let currIdx = 0;
        let timerVal = 10;
        let timerInt;
        let answered = false;

        const elCard = document.getElementById('flashcard');
        const elTimer = document.getElementById('timerBadge');
        const elControls = document.getElementById('controls');

        function initApp() {
            if (typeof questionDatabase === 'undefined') {
                document.getElementById('qText').innerText = "Gagal memuat soal-database.js";
                return;
            }
            loadQuestion();
        }

        function startTimer() {
            clearInterval(timerInt);
            timerVal = 10;
            elTimer.innerText = timerVal + "s";
            elTimer.classList.remove('danger');
            
            timerInt = setInterval(() => {
                timerVal--;
                elTimer.innerText = timerVal + "s";
                if(timerVal <= 3) elTimer.classList.add('danger');
                if(timerVal <= 0) {
                    clearInterval(timerInt);
                    if(!answered) handleAnswer(-1);
                }
            }, 1000);
        }

        function loadQuestion() {
            answered = false;
            elCard.classList.remove('is-flipped');
            elControls.style.display = 'none';
            document.getElementById('qCounter').innerText = `${currIdx + 1}/10`;
            
            const data = questionDatabase[currIdx];
            document.getElementById('qCategory').innerText = data.category;
            document.getElementById('qText').innerHTML = data.question;
            
            const optCont = document.getElementById('optContainer');
            optCont.innerHTML = '';
            
            const letters = ['A','B','C','D','E'];
            data.options.forEach((txt, i) => {
                optCont.innerHTML += `
                    <button class="btn-opt" onclick="handleAnswer(${i})">
                        <span class="opt-letter">${letters[i]}</span> <span>${txt}</span>
                    </button>`;
            });

            startTimer();
        }

        function handleAnswer(selectedIdx) {
            if(answered) return;
            answered = true;
            clearInterval(timerInt); 
            
            const data = questionDatabase[currIdx];
            const isCorrect = (selectedIdx === data.correctIndex);
            
            const badge = document.getElementById('resBadge');
            if(selectedIdx === -1) {
                badge.innerText = "Waktu Habis!";
                badge.style.background = "#ef4444";
            } else if(isCorrect) {
                badge.innerText = "Tepat Sekali!";
                badge.style.background = "#10b981";
            } else {
                badge.innerText = "Kurang Tepat!";
                badge.style.background = "#ef4444";
            }

            const letters = ['A','B','C','D','E'];
            document.getElementById('ansText').innerText = `${letters[data.correctIndex]}. ${data.options[data.correctIndex]}`;
            document.getElementById('expText').innerHTML = data.explanation;

            const breakdownGrid = document.getElementById('breakdownGrid');
            breakdownGrid.innerHTML = '';
            if(data.breakdowns) {
                data.breakdowns.forEach(item => {
                    breakdownGrid.innerHTML += `<div class="breakdown-item">${item}</div>`;
                });
            }

            elCard.classList.add('is-flipped');
            elControls.style.display = 'flex';
        }

        function nextQuestion() {
            // BATAS TRIAL: Berhenti jika sudah soal ke-10 (Index 9)
            if(currIdx < 9 && currIdx < questionDatabase.length - 1) {
                currIdx++;
                loadQuestion();
            } else {
                // Munculkan Halaman Download TeraBox
                document.getElementById('quizArea').style.display = 'none';
                document.getElementById('controls').style.display = 'none';
                document.getElementById('topBar').style.display = 'none';
                document.getElementById('trialEnd').classList.add('active');
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
